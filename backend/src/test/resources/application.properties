# database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/coding_platform}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# jpa
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# graphql
spring.graphql.graphiql.enabled=true

# security
# generate with: openssl rand -base64 32
application.security.jwt.secret=${JWT_SECRET:Xi4c1f9VfwfNy6mLpeTattCjiwvdjS1EZKF90ts7bbw=}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

#docker
runner.image=java-test-runner:latest
runner.timeout-s=30
runner.memory-mb=256
runner.cpus=1
runner.network=none

# logging
logging.level.com.github.prodws.codingplatform=DEBUG

# Submission validation
submission.max-code-size-kb=100
submission.max-line-length=200



